<!-- Chat bubble -->
<div class="chat-bubble" (click)="toggleChat()" *ngIf="!isOpen">
  <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="white" viewBox="0 0 24 24">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
  </svg>
</div>

<!-- Chat window -->
<div class="chat-window" *ngIf="isOpen">
  <div class="chat-header">
    <div class="header-info">
      <div class="avatar">🏨</div>
      <div>
        <div class="hotel-name">Hotel Assistant</div>
        <div class="status">● Online</div>
      </div>
    </div>
    <button class="close-btn" (click)="toggleChat()">✕</button>
  </div>

  <div class="messages-area" #messagesContainer>
    <div class="welcome-msg" *ngIf="messages.length === 0">
      <p>👋 გამარჯობა! მე ვარ სასტუმროს ასისტენტი.</p>
      <p>ვეცდები დაგეხმაროთ და ყველა თქვენს კიხთხვაზე ამომწურავად გიპასუხოთ.
    </div>

    <div *ngFor="let msg of messages" class="message" [ngClass]="msg.role === 'user' ? 'user-msg' : 'bot-msg'">
      <div class="bubble">{{ msg.content }}</div>
      <div class="time">{{ msg.timestamp | date:'HH:mm' }}</div>
    </div>

    <div class="typing" *ngIf="isLoading">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="input-area">
    <input
      type="text"
      [(ngModel)]="userInput"
      (keydown.enter)="sendMessage()"
      placeholder="შეიყვანეთ კითხვა..."
      [disabled]="isLoading"
    />
    <button (click)="sendMessage()" [disabled]="isLoading || !userInput.trim()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>
