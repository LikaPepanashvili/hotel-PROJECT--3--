<div class="page-header">
  <div class="container">
    <h1>All Hotels</h1>
    <p>Choose from our selection of premium hotels</p>
  </div>
</div>

<div class="container page-content">
  <div class="filter-tabs">
    <button class="tab-btn" [class.active]="selectedCity===''" (click)="filterCity('')">All</button>
    <button class="tab-btn" *ngFor="let c of cities" [class.active]="selectedCity===c" (click)="filterCity(c)">{{ c }}</button>
  </div>

  <div class="spinner-wrap" *ngIf="loading">
    <div class="spinner"></div><p>Loading hotels...</p>
  </div>

  <div class="hotels-grid" *ngIf="!loading">
    <a class="hotel-card" *ngFor="let h of filteredHotels" [routerLink]="['/room']" [queryParams]="{id: h.id}">
      <div class="hcard-img">
        <img [src]="h.featuredImage" [alt]="h.name" (error)="onImgErr($event)">
        <div class="hcard-overlay"><span>View Rooms →</span></div>
      </div>
      <div class="hcard-body">
        <h3>{{ h.name }}</h3>
        <p class="hcard-city">📍 {{ h.city }}</p>
        <p class="hcard-addr">{{ h.address }}</p>
      </div>
    </a>
  </div>

  <p class="empty-msg" *ngIf="!loading && filteredHotels.length === 0">No hotels found.</p>
</div>
