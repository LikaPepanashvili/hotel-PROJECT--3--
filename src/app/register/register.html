<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">✨</div>
    <h2>Create Account</h2>
    <p class="subtitle">Join us today</p>
    <form #registerForm="ngForm" (ngSubmit)="register(registerForm)">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="firstName" ngModel required placeholder="John">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="lastName" ngModel required placeholder="Doe">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" ngModel required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phoneNumber" ngModel required placeholder="+995 555 000 000">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input [type]="showPass ? 'text' : 'password'" name="password" ngModel required placeholder="Min 6 characters">
          <button type="button" class="eye-btn" (click)="showPass=!showPass">{{ showPass ? '🙈' : '👁️' }}</button>
        </div>
      </div>

      <div class="api-error" *ngIf="apiError">
        <strong>⚠️ Server Error:</strong>
        <p>{{ apiError }}</p>
      </div>

      <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>
      <p class="success-msg" *ngIf="successMsg">{{ successMsg }}</p>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>
    <p class="switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
